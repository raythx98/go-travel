services:
  api:
    build: .
    environment:
      - PORT=8080
      - ALLOWED_ORIGIN
      - GEMINI_API_KEY
      - GEMINI_MODEL
      - DATABASE_URL=postgres://user:pass@postgres:5432/travelplanner
      - REDIS_URL=redis://redis:6379
      - OLLAMA_URL=http://ollama:11434
      - SEARXNG_URL=http://searxng:8080
      - LANGFUSE_HOST=http://langfuse:3000
      - LANGFUSE_PUBLIC_KEY
      - LANGFUSE_SECRET_KEY
    depends_on:
      - postgres
      - redis
      - langfuse
      - ollama
      - searxng
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: travelplanner
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    environment:
      - DATABASE_URL=postgres://user:pass@postgres:5432/langfuse
      - NEXTAUTH_SECRET=change-me-in-production
      - NEXTAUTH_URL=http://localhost:3000
      - SALT=change-me-in-production-salt
      - TELEMETRY_ENABLED=false
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # After first run: docker exec ollama ollama pull nomic-embed-text
    # Phase 3+:        docker exec ollama ollama pull llama3.2

  searxng:
    image: searxng/searxng
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
  caddy_data:
